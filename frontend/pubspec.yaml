name: plastic_watch
description: Plastic Waste Monitoring and Awareness Program
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP client
  dio: ^5.4.3+1

  # Secure token storage (web-compatible)
  flutter_secure_storage: ^9.0.0

  # State management
  provider: ^6.1.2

  # Google Maps (web-compatible)
  google_maps_flutter: ^2.6.1
  google_maps_flutter_web: ^0.5.7

  # Image picker (web-compatible)
  image_picker: ^1.1.2

  # Local storage
  shared_preferences: ^2.2.3

  # Charts
  fl_chart: ^0.68.0

  # Connectivity check
  connectivity_plus: ^6.0.3

  # Cached network images
  cached_network_image: ^3.3.1

  # Icons
  cupertino_icons: ^1.0.6

  # URL launcher
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/

services:
  # ── Spring Boot Backend ──────────────────────────────────────────────────────
  - type: web
    name: plasticwatch-backend
    runtime: java
    plan: free
    buildCommand: cd backend && mvn clean package -DskipTests
    startCommand: java -jar backend/target/plastic-watch-backend-1.0.0.jar
    envVars:
      - key: DB_USERNAME
        sync: false          # Set in Render dashboard
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: UPLOAD_DIR
        value: /tmp/uploads
      - key: BASE_URL
        fromService:
          type: web
          name: plasticwatch-backend
          property: host
      - key: SPRING_DATASOURCE_URL
        sync: false          # Set to your MySQL URL in dashboard

  # ── Flutter Web Frontend ─────────────────────────────────────────────────────
  - type: web
    name: plasticwatch-frontend
    runtime: static
    plan: free
    buildCommand: cd frontend && flutter build web --release
    staticPublishPath: frontend/build/web
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

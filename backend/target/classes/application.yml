spring:
  application:
    name: plastic-watch-backend

  datasource:
    url: jdbc:mysql://localhost:3306/plastic_watch?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:plasticwatch}
    password: ${DB_PASSWORD:plastic123}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 15MB

  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC

server:
  port: 8080
  servlet:
    context-path: /api

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:PlasticWatchSuperSecretKeyForJWTSigningMustBe256BitsLong!}
  access-token-expiry-ms: 900000       # 15 minutes
  refresh-token-expiry-ms: 604800000   # 7 days

# File storage
storage:
  upload-dir: ${UPLOAD_DIR:./uploads}
  base-url: ${BASE_URL:http://plastic-watch-backend.onrender.com/api}

# SpringDoc OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    tryItOutEnabled: true

logging:
  level:
    com.plasticwatch: DEBUG
    org.springframework.security: INFO
